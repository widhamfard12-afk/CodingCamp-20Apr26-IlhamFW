<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do List Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button id="theme-toggle">Dark Mode</button>

  <div class="container">
    <div class="header card">
      <h1 id="time">00:00:00</h1>
      <p id="date">Date</p>
      <h2 id="greeting">Hello</h2>
      <div class="custom-name">
  <input type="text" id="nameInput" placeholder="Username">
  <button type="button" id="saveNameBtn">Save</button>
    </div>

<h3 id="customGreeting"></h3>

    </div>

    <div class="grid">
      <div class="card">
        <h3 class="center-title">Focus Timer</h3>
        <div id="timer">25:00</div>
        <div class="timer-buttons">
         <button onclick="startTimer()">Start</button>
         <button onclick="stopTimer()">Stop</button>
         <button onclick="resetTimer()">Reset</button>
        </div>
        <div class="timer-set">
          <input type="number" id="customMinutes" placeholder="Minutes" min="1" max="99">
          <button onclick="setCustomTimer()">Set</button>
        </div>
      </div>

      <div class="card">
        <h3>Tasks</h3>
        <div class="task-actions">
          <input type="text" id="taskInput" placeholder="Add a new task..">
          <button class="red-btn" onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
      </div>

      <div class="card">
        <h3>Quick Links</h3>
        <div class="link-actions">
          <input type="text" id="linkName" placeholder="Link name">
          <input type="text" id="linkURL" placeholder="URL">
          <button class="red-btn" onclick="addLink()">Add Link</button>
        </div>
        <div id="links"></div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
